<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocuMind AI — Intelligent Document Intelligence Platform</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf-autotable/3.5.25/jspdf.plugin.autotable.min.js"></script>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0a0a0f; --paper: #f5f3ee; --cream: #ede9e0;
    --accent: #c8441a; --accent2: #1a6bc8; --gold: #c8a41a;
    --green: #1ac86b; --muted: #7a7570; --border: #d4cfc6; --card: #ffffff;
    --mono: 'DM Mono', monospace; --serif: 'DM Serif Display', serif; --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  body::before { content: ''; position: fixed; inset: 0; pointer-events: none; z-index: 0; opacity: 0.3;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.75' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.05'/%3E%3C/svg%3E"); }

  header { position: sticky; top: 0; z-index: 100; background: var(--ink); border-bottom: 2px solid var(--accent); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { font-family: var(--serif); font-size: 1.4rem; color: var(--paper); display: flex; align-items: center; gap: 0.5rem; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(1.4)} }
  .header-nav { display: flex; gap: 1.5rem; align-items: center; }
  .header-nav a { color: var(--muted); font-size: 0.78rem; font-weight: 600; letter-spacing: 0.08em; text-transform: uppercase; text-decoration: none; transition: color 0.2s; cursor: pointer; }
  .header-nav a:hover { color: var(--paper); }
  .badge-live { background: var(--accent); color: white; font-size: 0.6rem; font-weight: 700; letter-spacing: 0.1em; padding: 2px 7px; border-radius: 2px; }

  .api-banner { background: #111a11; border-bottom: 1px solid #1e3a1e; padding: 0.6rem 2rem; display: flex; align-items: center; gap: 1rem; font-family: var(--mono); font-size: 0.72rem; flex-wrap: wrap; }
  .api-banner label { color: #7ec891; flex-shrink: 0; font-weight: 600; }
  .api-banner input { background: #0d160d; border: 1px solid #1e3a1e; color: #a6e3a1; font-family: var(--mono); font-size: 0.72rem; padding: 0.35rem 0.8rem; flex: 1; min-width: 240px; max-width: 400px; outline: none; transition: border-color 0.2s; }
  .api-banner input:focus { border-color: #1ac86b; }
  .api-status { font-size: 0.65rem; flex-shrink: 0; }
  .api-status.ok  { color: var(--green); }
  .api-status.bad { color: var(--accent); }

  .hero { padding: 4rem 2rem 2.5rem; max-width: 1200px; margin: 0 auto; display: grid; grid-template-columns: 1fr 1fr; gap: 4rem; align-items: center; }
  h1 { font-family: var(--serif); font-size: clamp(2.2rem, 4vw, 3.5rem); line-height: 1.05; color: var(--ink); margin-bottom: 1.2rem; }
  .hero-sub { font-size: 1rem; line-height: 1.7; color: var(--muted); margin-bottom: 2rem; max-width: 460px; }
  
  .app-shell { max-width: 1200px; margin: 0 auto; padding: 0 2rem 4rem; display: grid; grid-template-columns: 340px 1fr; gap: 2rem; }
  .sidebar { display: flex; flex-direction: column; gap: 1.5rem; }
  .card { background: var(--card); border: 1px solid var(--border); overflow: hidden; }
  .card-header { padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border); background: var(--cream); display: flex; align-items: center; justify-content: space-between; }
  .card-title { font-size: 0.7rem; font-weight: 700; letter-spacing: 0.1em; text-transform: uppercase; color: var(--ink); }

  .upload-zone { border: 2px dashed var(--border); background: var(--cream); padding: 2.5rem 1.5rem; text-align: center; cursor: pointer; transition: all 0.2s; position: relative; }
  .upload-zone:hover { border-color: var(--accent); }
  .upload-zone input[type=file] { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-preview { display: none; flex-direction: column; gap: 0.6rem; padding: 1rem; }
  .file-list-item { font-family: var(--mono); font-size: 0.65rem; color: var(--muted); padding: 4px; border-bottom: 1px solid var(--border); }

  .analyze-btn { width: 100%; padding: 1rem; background: var(--accent); color: white; border: none; cursor: pointer; font-family: var(--sans); font-size: 0.88rem; font-weight: 700; text-transform: uppercase; transition: all 0.2s; }
  .analyze-btn:disabled { background: var(--muted); cursor: not-allowed; }
  
  .main-panel { display: flex; flex-direction: column; gap: 1.5rem; }
  .status-bar { background: var(--ink); color: var(--paper); padding: 0.65rem 1.2rem; display: flex; align-items: center; justify-content: space-between; font-family: var(--mono); font-size: 0.68rem; }
  
  .tabs { display: flex; border-bottom: 2px solid var(--border); }
  .tab-btn { padding: 0.75rem 1.1rem; border: none; background: transparent; font-family: var(--sans); font-size: 0.7rem; font-weight: 700; text-transform: uppercase; color: var(--muted); cursor: pointer; border-bottom: 2px solid transparent; }
  .tab-btn.active { color: var(--accent); border-bottom-color: var(--accent); }
  .tab-pane { display: none; padding: 1.5rem 0; }
  .tab-pane.active { display: block; }

  .dec-banner { padding: 1.1rem 1.4rem; display: flex; align-items: center; gap: 1rem; border-left: 4px solid; margin-bottom: 0.8rem; }
  .dec-banner.APPROVED { background:#1ac86b12; border-color:var(--green); }
  .dec-banner.REJECTED { background:#c8441a12; border-color:var(--accent); }
  
  /* NEW: Action Bar for PDF */
  .action-bar { display: flex; gap: 10px; margin-bottom: 1rem; }
  .btn-download { background: var(--accent2); color: white; border: none; padding: 0.5rem 1rem; font-size: 0.7rem; font-weight: 700; cursor: pointer; font-family: var(--mono); }

  .notif { position: fixed; bottom: 1.5rem; right: 1.5rem; z-index: 300; background: var(--ink); color: var(--paper); padding: 0.75rem 1.1rem; font-family: var(--mono); font-size: 0.7rem; transform: translateX(120%); transition: transform 0.28s ease; }
  .notif.show { transform: translateX(0); }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span>DocuMind AI</div>
  <nav class="header-nav">
    <a onclick="switchTab('overview')">Analysis</a>
    <a onclick="switchTab('json')">JSON</a>
    <span class="badge-live">v2.1 PRO</span>
  </nav>
</header>

<div class="api-banner">
  <label for="apiKey">🔑 ANTHROPIC KEY:</label>
  <input type="password" id="apiKey" placeholder="sk-ant-..." oninput="onKeyInput()"/>
  <span class="api-status bad" id="apiSt">Not set</span>
</div>

<main class="app-shell">
  <aside class="sidebar">
    <div class="card">
      <div class="card-header"><div class="card-title">📄 Batch Upload</div></div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" accept="image/*,.pdf" multiple onchange="handleFiles(this.files)"/>
        <span class="upload-icon">⬆</span>
        <span class="upload-label">Upload Multiple Docs</span>
        <span class="upload-sub">Supports Risk Photo Analysis</span>
      </div>
      <div class="upload-preview" id="uploadPrev">
        <div id="fileList"></div>
        <button class="change-btn" onclick="resetFiles()" style="width:100%; margin-top:10px; cursor:pointer;">✕ Clear All</button>
      </div>
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="runAnalysis()" disabled>Analyse Documents</button>
  </aside>

  <div class="main-panel">
    <div class="status-bar">
      <div class="s-left"><span id="stxt">Ready</span></div>
      <span id="sid">BATCH-ID: —</span>
    </div>

    <div class="action-bar" id="reportActions" style="display:none;">
        <button class="btn-download" onclick="downloadPDFReport()">📥 Download PDF Report</button>
    </div>

    <div>
      <div class="tabs">
        <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview')">Overview</button>
        <button class="tab-btn" data-tab="json" onclick="switchTab('json')">JSON Data</button>
      </div>

      <div class="tab-pane active" id="pane-overview">
        <div id="overviewOut">Upload documents to start analysis.</div>
      </div>
      <div class="tab-pane" id="pane-json">
        <pre id="jsonOut" style="background:#0d1117; color:#c9d1d9; padding:1rem; font-size:0.7rem; overflow:auto;"></pre>
      </div>
    </div>
  </div>
</main>

<div class="notif" id="notif"></div>

<script>
const STATE = { files: [], results: null, apiKey: '' };

function onKeyInput() {
    STATE.apiKey = document.getElementById('apiKey').value.trim();
    const ok = STATE.apiKey.startsWith('sk-ant');
    const el = document.getElementById('apiSt');
    el.textContent = ok ? '✓ Ready' : 'Invalid Key';
    el.className = 'api-status ' + (ok ? 'ok' : 'bad');
    refreshUI();
}

function handleFiles(files) {
    Array.from(files).forEach(file => {
        const reader = new FileReader();
        reader.onload = (e) => {
            STATE.files.push({
                name: file.name,
                type: file.type,
                base64: e.target.result.split(',')[1]
            });
            updateFileList();
        };
        reader.readAsDataURL(file);
    });
}

function updateFileList() {
    const list = document.getElementById('fileList');
    list.innerHTML = STATE.files.map(f => `<div class="file-list-item">📄 ${f.name}</div>`).join('');
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('uploadPrev').style.display = 'block';
    refreshUI();
}

function resetFiles() {
    STATE.files = [];
    document.getElementById('uploadZone').style.display = 'block';
    document.getElementById('uploadPrev').style.display = 'none';
    refreshUI();
}

function refreshUI() {
    const canAnalyze = STATE.apiKey.startsWith('sk-ant') && STATE.files.length > 0;
    document.getElementById('analyzeBtn').disabled = !canAnalyze;
}

async function runAnalysis() {
    const btn = document.getElementById('analyzeBtn');
    btn.innerText = "Analyzing Batch...";
    btn.disabled = true;

    // Model Change: Using Claude 3.5 Sonnet for vision + risk reasoning
    const prompt = `Analyze these ${STATE.files.length} documents. Perform: 
    1. Data Extraction 
    2. Photo Risk Analysis (Check for tampering, blur, or fraud indicators)
    Return a single JSON object with 'decision', 'risk_score' (0-100), 'summary', and 'extracted_data' array.`;

    const messages = [{
        role: "user",
        content: [
            { type: "text", text: prompt },
            ...STATE.files.map(f => ({
                type: f.type === 'application/pdf' ? "document" : "image",
                source: { type: "base64", media_type: f.type, data: f.base64 }
            }))
        ]
    }];

    try {
        const response = await fetch('https://api.anthropic.com/v1/messages', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'x-api-key': STATE.apiKey,
                'anthropic-version': '2023-06-01',
                'anthropic-dangerous-direct-browser-calls': 'true'
            },
            body: JSON.stringify({
                model: "claude-3-5-sonnet-20241022",
                max_tokens: 4000,
                messages: messages
            })
        });

        const data = await response.json();
        const textResponse = data.content[0].text;
        STATE.results = JSON.parse(textResponse.match(/\{[\s\S]*\}/)[0]);
        
        displayResults();
        toast("Analysis Completed", "ok");
    } catch (err) {
        document.getElementById('overviewOut').innerHTML = `<div style="color:red">Error: ${err.message}</div>`;
    } finally {
        btn.innerText = "Analyse Documents";
        btn.disabled = false;
    }
}

function displayResults() {
    const r = STATE.results;
    document.getElementById('reportActions').style.display = 'flex';
    document.getElementById('jsonOut').textContent = JSON.stringify(r, null, 2);
    
    document.getElementById('overviewOut').innerHTML = `
        <div class="dec-banner ${r.decision}">
            <div>
                <strong>DECISION: ${r.decision}</strong><br>
                <span>Risk Score: ${r.risk_score}/100</span>
            </div>
        </div>
        <p>${r.summary}</p>
    `;
}

function downloadPDFReport() {
    const { jsPDF } = window.jspdf;
    const doc = new jsPDF();
    const r = STATE.results;

    doc.setFont("helvetica", "bold");
    doc.text("DocuMind AI - Intelligent Analysis Report", 10, 10);
    doc.setFontSize(10);
    doc.text(`Status: ${r.decision} | Risk Score: ${r.risk_score}`, 10, 20);
    
    doc.text("Summary:", 10, 30);
    doc.setFont("helvetica", "normal");
    doc.text(doc.splitTextToSize(r.summary, 180), 10, 35);

    doc.save("DocuMind_Analysis_Report.pdf");
}

function switchTab(id) {
    document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('pane-' + id).classList.add('active');
    document.querySelector(`[data-tab="${id}"]`).classList.add('active');
}

function toast(msg) {
    const el = document.getElementById('notif');
    el.textContent = msg;
    el.classList.add('show');
    setTimeout(() => el.classList.remove('show'), 3000);
}
</script>
</body>
</html>
