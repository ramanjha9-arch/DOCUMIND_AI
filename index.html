<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>DocuMind AI — Intelligent Document Intelligence Platform</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Mono:wght@300;400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet"/>
<style>
  :root {
    --ink: #0a0a0f; --paper: #f5f3ee; --cream: #ede9e0;
    --accent: #c8441a; --accent2: #1a6bc8; --gold: #c8a41a;
    --green: #1ac86b; --muted: #7a7570; --border: #d4cfc6; --card: #ffffff;
    --mono: 'DM Mono', monospace; --serif: 'DM Serif Display', serif; --sans: 'Syne', sans-serif;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--paper); color: var(--ink); font-family: var(--sans); min-height: 100vh; overflow-x: hidden; }
  
  header { position: sticky; top: 0; z-index: 100; background: var(--ink); border-bottom: 2px solid var(--accent); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; }
  .logo { font-family: var(--serif); font-size: 1.4rem; color: var(--paper); display: flex; align-items: center; gap: 0.5rem; }
  .logo-dot { width: 8px; height: 8px; background: var(--accent); border-radius: 50%; display: inline-block; }
  .header-nav { display: flex; gap: 1.5rem; align-items: center; }
  .header-nav a { color: var(--muted); font-size: 0.78rem; font-weight: 600; text-transform: uppercase; text-decoration: none; cursor: pointer; transition: color 0.2s; }
  .header-nav a:hover { color: var(--paper); }

  .api-banner { background: #111a11; border-bottom: 1px solid #1e3a1e; padding: 0.6rem 2rem; display: flex; align-items: center; gap: 1rem; font-family: var(--mono); font-size: 0.72rem; flex-wrap: wrap; }
  .api-banner input { background: #0d160d; border: 1px solid #1e3a1e; color: #a6e3a1; font-family: var(--mono); padding: 0.35rem 0.8rem; flex: 1; outline: none; }
  .api-status { font-size: 0.65rem; }
  .api-status.ok { color: var(--green); }
  .api-status.bad { color: var(--accent); }

  .app-shell { max-width: 1200px; margin: 2rem auto; padding: 0 2rem; display: grid; grid-template-columns: 340px 1fr; gap: 2rem; }
  .card { background: var(--card); border: 1px solid var(--border); margin-bottom: 1.5rem; }
  .card-header { padding: 0.9rem 1.2rem; border-bottom: 1px solid var(--border); background: var(--cream); font-weight: 700; font-size: 0.7rem; text-transform: uppercase; }

  .upload-zone { border: 2px dashed var(--border); background: var(--cream); padding: 2rem; text-align: center; cursor: pointer; position: relative; }
  .upload-zone input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
  .upload-preview { display: none; padding: 1rem; flex-direction: column; gap: 0.5rem; }
  .preview-thumb { width: 100%; height: 150px; object-fit: cover; border: 1px solid var(--border); }

  .doc-type-btn { width: 100%; padding: 0.8rem; text-align: left; background: var(--paper); border: 1px solid var(--border); margin-bottom: 0.4rem; cursor: pointer; font-weight: 600; font-size: 0.8rem; }
  .doc-type-btn.active { background: var(--ink); color: var(--paper); }

  .analyze-btn { width: 100%; padding: 1.2rem; background: var(--accent); color: white; border: none; cursor: pointer; font-weight: 800; text-transform: uppercase; }
  .analyze-btn:disabled { background: var(--muted); cursor: not-allowed; }

  .tabs { display: flex; border-bottom: 2px solid var(--border); margin-bottom: 1rem; }
  .tab-btn { padding: 1rem; border: none; background: none; font-weight: 700; color: var(--muted); cursor: pointer; }
  .tab-btn.active { color: var(--accent); border-bottom: 2px solid var(--accent); }
  .tab-pane { display: none; }
  .tab-pane.active { display: block; }

  /* Risk Styling */
  .risk-box { background: #fff5f2; border: 1px solid #ffded4; padding: 1rem; border-left: 4px solid var(--accent); margin-top: 1rem; }
  .risk-header { font-family: var(--mono); color: var(--accent); font-weight: 800; font-size: 0.65rem; margin-bottom: 0.5rem; }
  .risk-item { font-size: 0.8rem; margin-bottom: 0.3rem; }

  .dec-banner { padding: 1.5rem; margin-bottom: 1rem; border-left: 5px solid; }
  .dec-banner.APPROVED { background: #1ac86b15; border-color: var(--green); }
  .dec-banner.REJECTED { background: #c8441a15; border-color: var(--accent); }
  .dec-banner.REVIEW { background: #c8a41a15; border-color: var(--gold); }

  .fields-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 1px; background: var(--border); }
  .field-card { background: white; padding: 1rem; }
  .field-key { font-family: var(--mono); font-size: 0.6rem; color: var(--muted); text-transform: uppercase; }
  .field-val { font-weight: 700; margin-top: 0.2rem; }

  .notif { position: fixed; bottom: 2rem; right: 2rem; background: var(--ink); color: white; padding: 1rem; transform: translateY(200%); transition: 0.3s; z-index: 9999; }
  .notif.show { transform: translateY(0); }
</style>
</head>
<body>

<header>
  <div class="logo"><span class="logo-dot"></span>DocuMind AI</div>
  <nav class="header-nav">
    <a onclick="switchTab('overview')">Overview</a>
    <a onclick="switchTab('extracted')">Data</a>
    <a onclick="switchTab('json')">JSON</a>
  </nav>
</header>

<div class="api-banner">
  <label style="color:white">API KEY:</label>
  <input type="password" id="apiKey" placeholder="sk-ant... or AIza..." oninput="onKeyInput()">
  <select id="modelSel" onchange="onKeyInput()">
    <option value="gemini-1.5-flash">Gemini 1.5 Flash (Free)</option>
    <option value="claude-3-5-sonnet-20240620">Claude 3.5 Sonnet</option>
  </select>
  <span id="apiSt" class="api-status bad">Key Required</span>
  <button onclick="testKey()" style="padding:0.3rem 1rem; cursor:pointer">Test</button>
</div>

<main class="app-shell">
  <aside>
    <div class="card">
      <div class="card-header">Upload File</div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" onchange="onFile(event)">
        <strong>Click to Upload</strong><br><small>PDF or Image</small>
      </div>
      <div class="upload-preview" id="uploadPrev">
        <img id="prevImg" class="preview-thumb" style="display:none">
        <div id="prevPdf" style="display:none; padding:1rem; background:#eee">PDF File</div>
        <button onclick="resetFile()" style="margin-top:0.5rem; cursor:pointer">Change File</button>
      </div>
    </div>

    <div class="card">
      <div class="card-header">Intent</div>
      <div class="doc-types">
        <button class="doc-type-btn active" data-type="auto" onclick="pickType(this)">🤖 Auto-Detect</button>
        <button class="doc-type-btn" data-type="underwriting" onclick="pickType(this)">👤 Customer Photo (Risk)</button>
        <button class="doc-type-btn" data-type="medical" onclick="pickType(this)">🏥 Medical Report</button>
      </div>
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="analyse()" disabled>Analyse</button>
  </aside>

  <section class="main-panel">
    <div class="tabs">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview',this)">Overview</button>
      <button class="tab-btn" data-tab="extracted" onclick="switchTab('extracted',this)">Extracted</button>
      <button class="tab-btn" data-tab="json" onclick="switchTab('json',this)">JSON</button>
    </div>

    <div class="tab-pane active" id="pane-overview">
      <div id="overviewOut" style="padding:2rem; text-align:center; color:#999">Upload and Analyse to see results</div>
    </div>
    <div class="tab-pane" id="pane-extracted"><div id="extractedOut" class="fields-grid"></div></div>
    <div class="tab-pane" id="pane-json"><pre id="jsonOut" style="background:#f4f4f4; padding:1rem; font-size:0.8rem"></pre></div>
  </section>
</main>

<div id="notif" class="notif"></div>

<script>
const S = { b64:null, mime:null, docType:'auto' };

function onKeyInput() {
  const k = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('modelSel').value;
  const isGemini = model.includes('gemini');
  const el = document.getElementById('apiSt');
  const ok = isGemini ? k.length > 10 : k.startsWith('sk-ant');
  el.textContent = ok ? '✓ Ready' : '⚠ Invalid';
  el.className = 'api-status ' + (ok ? 'ok' : 'bad');
  refreshBtn();
}

function refreshBtn() {
  const k = document.getElementById('apiKey').value;
  document.getElementById('analyzeBtn').disabled = !(k && S.b64);
}

function onFile(e) {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    S.b64 = ev.target.result.split(',')[1];
    S.mime = f.type || 'image/jpeg';
    document.getElementById('uploadZone').style.display = 'none';
    document.getElementById('uploadPrev').style.display = 'flex';
    const isImg = f.type.startsWith('image/');
    document.getElementById('prevImg').style.display = isImg ? 'block' : 'none';
    document.getElementById('prevPdf').style.display = isImg ? 'none' : 'block';
    if(isImg) document.getElementById('prevImg').src = ev.target.result;
    refreshBtn();
  };
  r.readAsDataURL(f);
}

function resetFile() {
  S.b64 = null;
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('uploadPrev').style.display = 'none';
  refreshBtn();
}

function pickType(btn) {
  document.querySelectorAll('.doc-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.docType = btn.dataset.type;
}

async function callAPI(payload, key) {
  const model = document.getElementById('modelSel').value;
  const isGemini = model.includes('gemini');
  const url = isGemini ? `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${key}` : 'https://api.anthropic.com/v1/messages';

  const options = {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(isGemini ? {
      contents: [{ parts: payload.messages[0].content }],
      systemInstruction: { parts: [{ text: payload.system }] },
      generationConfig: { responseMimeType: "application/json" }
    } : {
      model: model, system: payload.system, messages: payload.messages, max_tokens: 4096
    })
  };

  if(!isGemini) {
    options.headers['x-api-key'] = key;
    options.headers['anthropic-version'] = '2023-06-01';
    options.headers['anthropic-dangerous-direct-browser-access'] = 'true';
  }

  const res = await fetch(url, options);
  if (!res.ok) throw new Error('API Error');
  const data = await res.json();
  return isGemini ? data.candidates[0].content.parts[0].text : data.content[0].text;
}

async function analyse() {
  const key = document.getElementById('apiKey').value;
  document.getElementById('analyzeBtn').disabled = true;
  document.getElementById('overviewOut').textContent = "⏳ Analysing...";

  const system = `You are DocuMind AI. Extract data and evaluate underwriting risk.
  Return valid JSON ONLY:
  {
    "overall_decision": "APPROVED|REJECTED|REVIEW",
    "rationale": "reason",
    "risk_markers": ["marker 1", "marker 2"],
    "fields": {"name": "value"}
  }`;

  const isGemini = document.getElementById('modelSel').value.includes('gemini');
  const content = isGemini ? 
    [{ text: "Analyse this " + S.docType }, { inline_data: { mime_type: S.mime, data: S.b64 } }] : 
    [{ type: S.mime.includes('pdf')?'document':'image', source:{ type:'base64', media_type:S.mime, data:S.b64 } }, { type:'text', text:'Analyse' }];

  try {
    const text = await callAPI({ system, messages: [{ role:'user', content }] }, key);
    const result = JSON.parse(text);
    renderResults(result);
  } catch (err) {
    document.getElementById('overviewOut').textContent = "Error: " + err.message;
  } finally {
    document.getElementById('analyzeBtn').disabled = false;
  }
}

function renderResults(r) {
  let riskHtml = '';
  if (r.risk_markers && r.risk_markers.length) {
    riskHtml = `<div class="risk-box"><div class="risk-header">⚠️ UNDERWRITING RISK FLAGS</div>`;
    r.risk_markers.forEach(m => riskHtml += `<div class="risk-item">${m}</div>`);
    riskHtml += `</div>`;
  }

  document.getElementById('overviewOut').innerHTML = `
    <div class="dec-banner ${r.overall_decision}">
      <h2 style="font-family:serif">${r.overall_decision}</h2>
      <p style="font-size:0.9rem">${r.rationale}</p>
    </div>
    ${riskHtml}
  `;

  let fieldsHtml = '';
  for (const [k, v] of Object.entries(r.fields || {})) {
    fieldsHtml += `<div class="field-card"><div class="field-key">${k}</div><div class="field-val">${v}</div></div>`;
  }
  document.getElementById('extractedOut').innerHTML = fieldsHtml;
  document.getElementById('jsonOut').textContent = JSON.stringify(r, null, 2);
  switchTab('overview');
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function onKeyInput() {
  const k = document.getElementById('apiKey').value.trim();
  const model = document.getElementById('modelSel').value;
  const isGemini = model.includes('gemini');
  const el = document.getElementById('apiSt');
  const ok = isGemini ? k.length > 10 : k.startsWith('sk-ant');
  el.textContent = ok ? '✓ Ready' : '⚠ Invalid';
  el.className = 'api-status ' + (ok ? 'ok' : 'bad');
  refreshBtn();
}
</script>
</body>
</html>
