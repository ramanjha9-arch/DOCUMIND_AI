<body>

<header>
  <div class="logo"><span class="logo-dot"></span>DocuMind AI</div>
  <nav class="header-nav">
    <a onclick="switchTab('overview')">Overview</a>
    <a onclick="switchTab('extracted')">Extracted</a>
    <a onclick="switchTab('json')">JSON</a>
    <span class="badge-live">LIVE</span>
  </nav>
</header>

<div class="api-banner">
  <label for="apiKey">🔑 API KEY:</label>
  <input type="password" id="apiKey" placeholder="sk-ant... or AIza..." oninput="onKeyInput()"/>
  <span class="api-status bad" id="apiSt">Not set — required</span>
  <div style="display: flex; align-items: center; gap: 8px;">
    <select id="modelSel" onchange="onKeyInput()" style="background:#0d160d; color:#a6e3a1; font-family:var(--mono); font-size:0.69rem; border:1px solid #1e3a1e; padding:0.32rem 0.6rem;">
      <option value="gemini-pro-latest">Gemini Pro (Advanced)</option>
      <option value="gemini-flash-latest" selected>Gemini Flash (Fast)</option>
    </select>
    <div id="modelStatus" style="width: 10px; height: 10px; border-radius: 50%; background: #333;"></div>
  </div>
  <button onclick="testKey()" style="background:#1a3a1a; color:#7ec891; font-family:var(--mono); font-size:0.65rem; padding:0.32rem 0.8rem; cursor:pointer; border:1px solid #1e3a1e;">▶ Test Key</button>
</div>

<main class="app-shell" style="margin-top: 2rem;">
  <aside class="sidebar">
    <div class="card">
      <div class="card-header"><div class="card-title">📄 Document Upload (Multiple)</div></div>
      <div class="upload-zone" id="uploadZone">
        <input type="file" id="fileInput" multiple onchange="onFile(event)"/>
        <span style="font-size:2rem">⬆</span><br>
        <span class="upload-label">Select one or more photos</span>
      </div>
      <div class="upload-preview" id="uploadPrev" style="display:none; max-height: 300px; overflow-y: auto; padding: 10px;">
        <div id="previewGrid" style="display: grid; grid-template-columns: 1fr 1fr; gap: 5px;"></div>
        <button onclick="resetFile()" style="width:100%; margin-top:0.5rem; cursor:pointer; padding: 5px;">✕ Clear All</button>
      </div>
    </div>

    <div class="card">
        <div class="card-header"><div class="card-title">⚙️ Extraction Rules</div></div>
        <div style="padding: 10px;">
            <textarea id="customRules" placeholder="Enter custom rules (e.g. 'Identify if document is expired', 'Check for handwritten notes')" style="width:100%; height:80px; font-family:var(--mono); font-size:0.7rem; padding:8px; border:1px solid var(--border);"></textarea>
        </div>
    </div>

    <div class="card">
      <div class="card-header"><div class="card-title">🗂 Intent</div></div>
      <div class="doc-types">
        <button class="doc-type-btn active" data-type="auto" onclick="pickType(this)">🤖 Auto-Detect (All Types)</button>
        <button class="doc-type-btn" data-type="underwriting" onclick="pickType(this)">👤 Photo Risk</button>
        <button class="doc-type-btn" data-type="medical" onclick="pickType(this)">🏥 Medical</button>
      </div>
    </div>

    <button class="analyze-btn" id="analyzeBtn" onclick="analyse()" disabled>Analyse Batch</button>
  </aside>

  <div class="main-panel">
    <div class="status-bar">
      <div><span class="sdot" id="sdot"></span> <span id="stxt">Ready</span></div>
      <span id="sid">SESSION: —</span>
    </div>

    <div class="tabs">
      <button class="tab-btn active" data-tab="overview" onclick="switchTab('overview',this)">Overview</button>
      <button class="tab-btn" data-tab="extracted" onclick="switchTab('extracted',this)">Extracted</button>
      <button class="tab-btn" data-tab="json" onclick="switchTab('json',this)">JSON</button>
    </div>

    <div class="tab-pane active" id="pane-overview"><div id="overviewOut" style="padding:2rem; text-align:center; color:var(--muted)">Waiting for analysis...</div></div>
    <div class="tab-pane" id="pane-extracted"><div id="extractedOut" class="fields-grid"></div></div>
    <div class="tab-pane" id="pane-json"><div id="jsonOut" class="json-out"></div></div>
  </div>
</main>

<script>
const S = { files: [], docType:'auto', sid:null };

function init() {
  S.sid = 'SID-' + Math.random().toString(36).substr(2,8).toUpperCase();
  document.getElementById('sid').textContent = 'SESSION: ' + S.sid;
}

function onKeyInput() {
  const k = document.getElementById('apiKey').value.trim();
  const el = document.getElementById('apiSt');
  const indicator = document.getElementById('modelStatus');
  const ok = k.length > 10;
  
  el.textContent = ok ? '✓ Ready' : '⚠ Invalid';
  el.className = 'api-status ' + (ok ? 'ok' : 'bad');
  indicator.style.background = ok ? '#1ac86b' : '#333';
  if(ok) {
    indicator.style.boxShadow = "0 0 8px #1ac86b";
    sessionStorage.setItem('dm_key', k);
  }
  refreshBtn();
}

function refreshBtn() {
  const k = document.getElementById('apiKey').value;
  document.getElementById('analyzeBtn').disabled = !(k && S.files.length > 0);
}

async function onFile(e) {
  const files = Array.from(e.target.files);
  if (!files.length) return;
  
  S.files = [];
  const grid = document.getElementById('previewGrid');
  grid.innerHTML = '';

  for (const file of files) {
    const base64 = await toBase64(file);
    S.files.push({ b64: base64.split(',')[1], mime: file.type });
    
    const img = document.createElement('img');
    img.src = base64;
    img.className = 'preview-thumb';
    img.style.height = "80px";
    grid.appendChild(img);
  }

  document.getElementById('uploadZone').style.display = 'none';
  document.getElementById('uploadPrev').style.display = 'block';
  refreshBtn();
}

const toBase64 = file => new Promise((resolve, reject) => {
    const reader = new FileReader();
    reader.readAsDataURL(file);
    reader.onload = () => resolve(reader.result);
    reader.onerror = error => reject(error);
});

function resetFile() {
  S.files = [];
  document.getElementById('uploadZone').style.display = 'block';
  document.getElementById('uploadPrev').style.display = 'none';
  refreshBtn();
}

function pickType(btn) {
  document.querySelectorAll('.doc-type-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  S.docType = btn.dataset.type;
}

async function analyse() {
  const key = document.getElementById('apiKey').value;
  const rules = document.getElementById('customRules').value;
  setStatus('processing', `Analysing ${S.files.length} document(s)...`);

  const system = `You are DocuMind AI. 
  CLASSIFICATION TASK: For every image, classify as [Income, Medical, Photo, KYC].
  EXTRACTION RULES: ${rules || "Extract all standard fields"}.
  Return valid JSON ONLY: { 
    "classifications": [], 
    "overall_decision": "APPROVED|REJECTED|REVIEW", 
    "rationale": "reason", 
    "fields": {} 
  }`;

  // Build parts for Gemini (supporting multiple images)
  const contentParts = S.files.map(f => ({ inline_data: { mime_type: f.mime, data: f.b64 } }));
  contentParts.push({ text: "Perform analysis on all provided documents." });

  try {
    const res = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${key}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        contents: [{ parts: contentParts }],
        systemInstruction: { parts: [{ text: system }] },
        generationConfig: { responseMimeType: "application/json" }
      })
    });

    const data = await res.json();
    const r = JSON.parse(data.candidates[0].content.parts[0].text);
    
    // UI Rendering
    const classTags = r.classifications.map(c => `<span class="badge-live" style="background:var(--accent2); margin-right:5px;">${c}</span>`).join('');
    document.getElementById('overviewOut').innerHTML = `
      <div class="dec-banner ${r.overall_decision}">
        <div><div class="sc-l">Types Detected</div><div style="margin-top:5px">${classTags}</div></div>
        <div style="text-align:right"><div class="sc-l">Decision</div><div class="stat-val">${r.overall_decision}</div></div>
      </div>
      <p style="padding:1rem">${r.rationale}</p>`;

    document.getElementById('extractedOut').innerHTML = Object.entries(r.fields || {}).map(([k,v])=>`<div class="fc"><div class="fk">${k}</div><div class="fv">${v}</div></div>`).join('');
    document.getElementById('jsonOut').textContent = JSON.stringify(r, null, 2);
    
    setStatus('ready', 'Batch Analysis Complete');
  } catch (err) {
    setStatus('error', "API Error: Check Key or Connection");
  }
}

function switchTab(id, btn) {
  document.querySelectorAll('.tab-pane').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('pane-' + id).classList.add('active');
  if(btn) btn.classList.add('active');
}

function setStatus(type, text) {
  document.getElementById('sdot').className = 'sdot ' + type;
  document.getElementById('stxt').textContent = text;
}

init();
</script>
</body>
